# mod_auth_openidc — Keycloak OIDC configuration
# Realm: utdallas-cs | Client: apache-oidc-client

OIDCProviderMetadataURL https://auth.savvytechies.com/realms/utdallas-cs/.well-known/openid-configuration
OIDCClientID             apache-oidc-client
OIDCClientSecret         LfczHd9ajA7WV7wTuaXAm2y7NS7eEWsQ
OIDCRedirectURI          http://localhost:8083/redirect_uri
OIDCCryptoPassphrase     353a4242be0d7376e9bd1f39ad2655af

# Session storage
OIDCSessionType          server-cache

# Claims to expose as headers
OIDCRemoteUserClaim      preferred_username
OIDCPassClaimsAs         headers

# Apache must be told to listen on 8083 (Debian's ports.conf only has "Listen 80")
Listen 8083

<VirtualHost *:8083>
    ServerName localhost
    DocumentRoot /var/www/html

    # Public area — no auth required
    <Location /public>
        AuthType None
        Require all granted
    </Location>

    # Protected area — requires Keycloak login
    <Location /secure>
        AuthType openid-connect
        Require valid-user
    </Location>

    # Redirect URI for OAuth2 callback (handled by mod_auth_openidc)
    <Location /redirect_uri>
        AuthType openid-connect
        Require valid-user
    </Location>

    # Pass OIDC claims as HTTP headers to backend/CGI
    Header always set X-User          "%{OIDC_CLAIM_preferred_username}e" env=OIDC_CLAIM_preferred_username
    Header always set X-Email         "%{OIDC_CLAIM_email}e"              env=OIDC_CLAIM_email
    Header always set X-Roles         "%{OIDC_CLAIM_realm_access}e"       env=OIDC_CLAIM_realm_access

    ErrorLog  /var/log/apache2/oidc_error.log
    CustomLog /var/log/apache2/oidc_access.log combined
</VirtualHost>
