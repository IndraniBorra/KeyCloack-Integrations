<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Profile — Keycloak Spring Boot Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <span class="navbar-brand">Keycloak Spring Boot Demo</span>
    <span class="text-white-50 small">Realm: utdallas-cs</span>
  </div>
</nav>
<div class="container">
  <h2>Profile (Protected)</h2>
  <div class="alert alert-success">Authenticated via Keycloak OIDC</div>
  <table class="table table-bordered">
    <tr><th>Username</th><td th:text="${user?.preferredUsername}"></td></tr>
    <tr><th>Email</th><td th:text="${user?.email ?: 'N/A'}"></td></tr>
    <tr><th>Full Name</th><td th:text="${user?.fullName ?: 'N/A'}"></td></tr>
    <tr><th>Roles</th><td th:text="${roles}"></td></tr>
    <tr><th>Subject</th><td><code th:text="${user?.subject}"></code></td></tr>
  </table>
  <h5 class="mt-4">Tokens</h5>
  <h6>Access Token</h6>
  <pre style="word-wrap:break-word;white-space:pre-wrap;background:#f1f3f5;padding:1rem;border-radius:8px;font-size:.85rem;" th:text="${accessToken}"></pre>
  <h6>ID Token</h6>
  <pre style="word-wrap:break-word;white-space:pre-wrap;background:#f1f3f5;padding:1rem;border-radius:8px;font-size:.85rem;" th:text="${idToken}"></pre>
  <a href="/" class="btn btn-secondary me-2">Home</a>
  <a href="/logout" class="btn btn-outline-danger">Logout</a>
</div>
</body>
</html>
