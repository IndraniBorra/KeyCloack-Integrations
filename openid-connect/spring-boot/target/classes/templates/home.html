<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <title>Home — Keycloak Spring Boot Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <span class="navbar-brand">Keycloak Spring Boot Demo</span>
    <span class="text-white-50 small">Realm: utdallas-cs</span>
  </div>
</nav>
<div class="container">
  <h2>Home</h2>
  <div sec:authorize="isAuthenticated()" class="alert alert-success">
    Welcome, <strong th:text="${user?.preferredUsername}">user</strong>!
    <a href="/profile" class="btn btn-primary btn-sm ms-2">Profile</a>
    <a href="/admin" class="btn btn-warning btn-sm ms-2">Admin</a>
    <a href="/logout" class="btn btn-outline-danger btn-sm ms-2">Logout</a>
  </div>
  <div sec:authorize="!isAuthenticated()" class="alert alert-secondary">
    You are not logged in.
    <a href="/oauth2/authorization/keycloak" class="btn btn-primary btn-sm ms-2">Login with Keycloak</a>
  </div>
  <a href="/public" class="btn btn-outline-secondary">Public Page</a>
</div>
</body>
</html>
