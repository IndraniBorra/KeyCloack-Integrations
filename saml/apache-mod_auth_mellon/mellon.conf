# mod_auth_mellon — Keycloak SAML SP configuration
# Realm: utdallas-cs | Client: apache-mellon-client

<VirtualHost *:8085>
    ServerName localhost
    DocumentRoot /var/www/html

    # mod_auth_mellon global setup
    MellonSPPrivateKeyFile  /etc/apache2/mellon/sp.key
    MellonSPCertFile        /etc/apache2/mellon/sp.crt
    MellonSPMetadataFile    /etc/apache2/mellon/sp-metadata.xml

    # IdP metadata downloaded from Keycloak
    MellonIdPMetadataFile   /etc/apache2/mellon/idp-metadata.xml

    MellonEndpointPath /secure/
    MellonSPentityId   http://localhost:8085/secure/

    # Public area — no auth
    <Location /public>
        AuthType None
        Require all granted
    </Location>

    # Protected area — requires SAML authentication
    <Location /secure>
        AuthType Mellon
        MellonEnable "auth"
        Require valid-user

        # Expose SAML attributes as environment variables
        MellonSetEnvNoPrefix "MELLON_NAME_ID"       nameID
        MellonSetEnvNoPrefix "MELLON_EMAIL"         email
        MellonSetEnvNoPrefix "MELLON_USERNAME"      preferred_username
        MellonSetEnvNoPrefix "MELLON_ROLE"          Role
    </Location>

    ErrorLog  /var/log/apache2/mellon_error.log
    CustomLog /var/log/apache2/mellon_access.log combined
</VirtualHost>
